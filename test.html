<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Page</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding-top: 100px;
}

.box {
    background: #1e293b;
    display: inline-block;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="box">
    <h1>🚀 Site is LIVE</h1>
    <p>If you can see this, your GitHub Pages deployment worked.</p>
    <p id="time"></p>
</div>

<script>
    // Show current time (proves page is loading fresh)
    const now = new Date();
    document.getElementById("time").innerHTML =
        "Loaded at: " + now.toLocaleString();
</script>

</body>
</html>
